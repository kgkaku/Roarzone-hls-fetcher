name: Refresh

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4
    
    - name: Run & Refresh 
      env:
        MAIN_PY_BASE64: ${{ secrets.MAIN_PY }}
      run: |
        # Decode the base64 encoded script
        echo "$MAIN_PY_BASE64" | base64 -d > main.py
        # Run the script
        python main.py
    
    - name: Upload playlist artifact
      uses: actions/upload-artifact@v4
      with:
        
        path: roarzone.m3u
        retention-days: 7
    
    - name: Commit and push playlist (optional)
      if: success()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add roarzone.m3u 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Update roarzone.m3u playlist [skip ci]"
        git push
